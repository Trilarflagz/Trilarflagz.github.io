# Site Settings
title                    : "Tian Jingqi"
description              : "Researcher in AI and Computer Vision with a focus on multimodal systems, deep learning, and computer vision."
repository               : "Trilarflagz/Trilarflagz.github.io"
google_scholar_stats_use_cdn : true

# google analytics
google_analytics_id      :  # 如果需要Google Analytics, 可以在此处填写ID

# SEO Related
google_site_verification :  # 如果使用Google站点验证，请填写此处
bing_site_verification   :  # 如果使用Bing站点验证，请填写此处
baidu_site_verification  :  # 如果使用百度站点验证，请填写此处

# Site Author
author:
  name             : "Tian Jingqi"
  avatar           : "images/android-chrome-512x512.png"
  bio              : "Sichuan University, Computer Science"
  location         : "Beijing, China"
  employer         : "Sichuan University"
  pubmed           : 
  googlescholar    :  # 如果没有 Google Scholar，可以留空
  email            : "jingqi71tian@gmail.com"
  researchgate     :  # 如果有 ResearchGate 链接，可以在此处添加
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "Trilarflagz"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :  # LinkedIn链接可以填写在此处
  dblp             :  # 如果有 DBLP 链接可以在此处填写
  orcid            :  # 如果有 ORCID 链接可以在此处填写
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          : 
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
